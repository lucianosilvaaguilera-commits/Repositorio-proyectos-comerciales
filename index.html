<title>Proyectos Comerciales · Ferronor</title>

<style>
  :root{
    --teal:#167489;         /* teal Ferronor — color de marca */
    --teal-oscuro:#0E4A57;  /* titulares, texto fuerte */
    --celeste:#E1F0F5;      /* fondo de tarjetas */
    --celeste-2:#F2F8FA;    /* paneles suaves */
    --borde:#BCDCE5;        /* bordes celestes */
    --tinta:#1C3A42;        /* texto principal */
    --gris:#5E7A84;         /* texto secundario */
    --blanco:#FFFFFF;
    --ambar:#C77E14;        /* señal: en evaluación */
    --verde:#2E8B57;        /* señal: activo */
    --rojo:#C0453F;         /* señal: detenido */
    --radius:8px;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{
    background:var(--blanco);
    color:var(--tinta);
    font-family:'Inter',system-ui,sans-serif;
    font-size:15px;
    line-height:1.6;
    min-height:100vh;
  }
  a{color:inherit}

  /* ---------- Cabecera ---------- */
  header{
    background:var(--blanco);
    border-bottom:3px solid var(--teal);
    padding:22px 0 0;
  }
  .wrap{max-width:1040px;margin:0 auto;padding:0 24px}
  .marca{display:flex;align-items:center;gap:18px;flex-wrap:wrap}
  .marca .logo{height:44px;width:auto;display:block}
  .marca h1{
    font-family:'Barlow Condensed',sans-serif;
    font-weight:700;font-size:30px;letter-spacing:.04em;
    text-transform:uppercase;color:var(--teal-oscuro);
  }
  .marca .area{
    font-size:12px;color:var(--gris);letter-spacing:.14em;
    text-transform:uppercase;
  }

  /* divisor "vía férrea": línea con durmientes en teal */
  .via{
    height:10px;margin-top:16px;
    background:
      repeating-linear-gradient(90deg, var(--teal) 0 3px, transparent 3px 26px) center/100% 10px no-repeat,
      linear-gradient(var(--borde),var(--borde)) center/100% 2px no-repeat;
    opacity:.85;
  }

  main{padding:36px 0 80px}

  /* ---------- Listado ---------- */
  .intro{max-width:620px;margin-bottom:34px}
  .intro p{color:var(--gris)}
  .contador{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;
    font-size:15px;letter-spacing:.12em;text-transform:uppercase;
    color:var(--teal);margin-bottom:6px;
  }
  .grid{
    display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
    gap:16px;
  }
  .card{
    background:var(--celeste);
    border:1px solid var(--borde);
    border-left:5px solid var(--teal);
    border-radius:var(--radius);
    padding:20px 20px 18px;
    cursor:pointer;
    transition:box-shadow .15s, transform .15s, border-color .15s;
    display:flex;flex-direction:column;gap:10px;
  }
  .card:hover,.card:focus-visible{
    border-color:var(--teal);
    box-shadow:0 6px 18px rgba(22,116,137,.18);
    transform:translateY(-2px);
  }
  .card:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
  .card h2{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;
    font-size:23px;letter-spacing:.02em;line-height:1.2;
    color:var(--teal-oscuro);
  }
  .card .cliente{font-size:13px;color:var(--gris)}
  .card .resumen{font-size:14px;color:var(--tinta);flex:1}

  /* señal ferroviaria de estado */
  .senal{display:inline-flex;align-items:center;gap:8px;font-size:12px;
    letter-spacing:.1em;text-transform:uppercase;font-weight:600}
  .senal .luz{width:10px;height:10px;border-radius:50%;box-shadow:0 0 6px currentColor}
  .estado-activo{color:var(--verde)}
  .estado-evaluacion{color:var(--ambar)}
  .estado-detenido{color:var(--rojo)}
  .estado-activo .luz{background:var(--verde)}
  .estado-evaluacion .luz{background:var(--ambar)}
  .estado-detenido .luz{background:var(--rojo)}

  /* ---------- Detalle ---------- */
  .volver{
    display:inline-flex;align-items:center;gap:8px;
    background:var(--blanco);border:1px solid var(--borde);color:var(--gris);
    border-radius:var(--radius);padding:7px 14px;font-size:13px;
    cursor:pointer;margin-bottom:26px;font-family:inherit;
    transition:border-color .15s,color .15s;
  }
  .volver:hover{border-color:var(--teal);color:var(--teal-oscuro)}
  .detalle h2{
    font-family:'Barlow Condensed',sans-serif;font-weight:700;
    font-size:38px;letter-spacing:.02em;line-height:1.1;margin-bottom:4px;
    color:var(--teal-oscuro);
  }
  .detalle .cliente{color:var(--gris);margin-bottom:14px}
  .detalle .senal{margin-bottom:26px}
  .bloque{
    background:var(--celeste-2);border:1px solid var(--borde);
    border-radius:var(--radius);padding:22px;margin-bottom:18px;
  }
  .bloque h3{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;
    font-size:16px;letter-spacing:.14em;text-transform:uppercase;
    color:var(--teal);margin-bottom:12px;
    border-bottom:2px solid var(--borde);padding-bottom:8px;
  }
  .bloque p{color:var(--tinta)}
  .bloque p + p{margin-top:8px}

  /* enlaces */
  .enlaces{list-style:none}
  .enlaces li{
    display:flex;align-items:center;gap:12px;
    padding:10px 4px;border-bottom:1px solid var(--borde);font-size:14px;
  }
  .enlaces li:last-child{border-bottom:none}
  .enlaces .ico{
    font-family:'Barlow Condensed',sans-serif;font-weight:600;font-size:12px;
    letter-spacing:.08em;color:var(--blanco);background:var(--teal);
    border-radius:4px;padding:2px 7px;min-width:46px;text-align:center;
  }
  .enlaces a{color:var(--teal-oscuro);text-decoration:none;flex:1;word-break:break-all}
  .enlaces a:hover{color:var(--teal);text-decoration:underline}

  footer{border-top:1px solid var(--borde);padding:18px 0;
    font-size:12px;color:var(--gris);background:var(--celeste-2)}

  @media (prefers-reduced-motion: reduce){
    *{transition:none !important}
  }
  @media (max-width:560px){
    .detalle h2{font-size:30px}
  }
</style>
</head>

      "Proceso de licitación para el servicio de transporte ferroviario de carga asociado al proyecto Taca Taca, gestionado por Corriente Argentina S.A. (CASA), filial de First Quantum Minerals."
    ]
  },
  {
    id: "el-pachon",
    nombre: "El Pachón",
    cliente: "Glencore",
    estado: "activo",
    resumen: "Proyecto comercial asociado a El Pachón. Editar esta descripción con el detalle del servicio o negocio en evaluación.",
    descripcion: [
      "Descripción del proyecto comercial asociado a El Pachón. Reemplazar este texto con los antecedentes, alcance y estado actual de la negociación o servicio."
    ]
  }
];

/* ===================================================================== */
const ESTADOS = {
  activo:     { clase: "estado-activo",     texto: "Activo" },
  evaluacion: { clase: "estado-evaluacion", texto: "En evaluación" },
  detenido:   { clase: "estado-detenido",   texto: "Detenido" }
};

const app = document.getElementById("app");

function esc(s){
  return String(s).replace(/[&<>"']/g, c => ({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  })[c]);
}

function senalHTML(estado){
  const e = ESTADOS[estado] || ESTADOS.evaluacion;
  return `<span class="senal ${e.clase}"><span class="luz"></span>${e.texto}</span>`;
}

/* ---------- Vista: listado ---------- */
function renderListado(){
  document.title = "Proyectos Comerciales · Ferronor";
  const cards = PROYECTOS.map(p => `
    <div class="card" role="link" tabindex="0" data-id="${esc(p.id)}"
         aria-label="Abrir proyecto ${esc(p.nombre)}">
      ${senalHTML(p.estado)}
      <h2>${esc(p.nombre)}</h2>
      <div class="cliente">${esc(p.cliente)}</div>
      <div class="resumen">${esc(p.resumen)}</div>
    </div>`).join("");

  app.innerHTML = `
    <div class="intro">
      <div class="contador">${PROYECTOS.length} proyecto${PROYECTOS.length===1?"":"s"} en cartera</div>
      <p>Selecciona un proyecto para ver su información completa y sus documentos.</p>
    </div>
    <div class="grid">${cards}</div>`;

  app.querySelectorAll(".card").forEach(c => {
    const abrir = () => { location.hash = "#/" + c.dataset.id; };
    c.addEventListener("click", abrir);
    c.addEventListener("keydown", e => { if(e.key === "Enter" || e.key === " "){ e.preventDefault(); abrir(); }});
  });
}

/* ---------- Vista: detalle ---------- */
function renderDetalle(p){
  document.title = p.nombre + " · Ferronor";
  const descripcion = p.descripcion.map(t => `<p>${esc(t)}</p>`).join("");
  const enlaces = (p.enlaces && p.enlaces.length)
    ? `<div class="bloque">
        <h3>Enlaces</h3>
        <ul class="enlaces">${p.enlaces.map(e =>
          `<li><span class="ico">LINK</span><a href="${esc(e.url)}" target="_blank" rel="noopener">${esc(e.titulo)}</a></li>`).join("")}</ul>
      </div>`
    : "";

  app.innerHTML = `
    <div class="detalle">
      <button class="volver" id="volver">← Volver al listado</button>
      <h2>${esc(p.nombre)}</h2>
      <div class="cliente">${esc(p.cliente)}</div>
      ${senalHTML(p.estado)}

      <div class="bloque">
        <h3>Descripción</h3>
        ${descripcion}
      </div>

      ${enlaces}
    </div>`;

  document.getElementById("volver").addEventListener("click", () => { location.hash = ""; });
}

/* ---------- Router por hash ---------- */
function router(){
  const id = location.hash.replace(/^#\/?/, "");
  const p = PROYECTOS.find(x => x.id === id);
  if(p){ renderDetalle(p); } else { renderListado(); }
  window.scrollTo(0,0);
}
window.addEventListener("hashchange", router);
router();
</script>
</body>
</html>
